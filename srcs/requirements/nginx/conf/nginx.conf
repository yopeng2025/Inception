server
{
    listen 80;                                 # Listen on port 80 for IPv4 and IPv6 (Standard HTTP)
    listen [::]:80;
    server_name yopeng.42.fr;
    return 301 https://$host$request_uri;      # Permanently redirect HTTP traffic to HTTPS
                                               # https://yopeng.42.fr/blog/post.php?id=42
                                               # $host: yopeng.42.fr 
                                               # request_uri: Request Uniform Resource Identifier: /blog/post.php?id=42
}
server 
{
    listen 443 ssl;
    listen [::]:443 ssl;                       # Listen on port 443 for IPv4 and IPv6 with SSL(https) enabled
    server_name yopeng.42.fr;

    ssl_certificate     /etc/nginx/ssl/inception.crt;  # path to SSL certificate & key generated in Dockerfile
    ssl_certificate_key /etc/nginx/ssl/inception.key;

    ssl_protocols TLSv1.2 TLSv1.3;             # Restrict protocols to TLS 1.2 and 1.3 for high security (Required by 42)  
    ssl_prefer_server_ciphers on;              # Enforce the server's preferred encryption ciphers over the client's
    root /var/www/html;                        # root directory for website files
    index index.php index.html index.htm;      # index:Default Home File Priority List (index.php->index.html->index.htm)

    location ^~ /adminer/
    {
        proxy_pass http://adminer:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forward_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /adminer
    {
        return 301 $scheme://$http_host/adminer/;
    }

    location /                                 # Default location block to handle general requests
    {
        try_files $uri $uri/ /index.php?$args; # Check if the requested file exists, then the folder; if not, pass to index.php
                                               # https://yopeng.42.fr/blog/post.php?id=42
                                               # $uri:   /blog/post.php 
                                               # $uri/:  /blog/post.php/
                                               # ?$args: ?id=42
    }
   
    location ~ \.php$                          # Location block specifically for processing PHP files
    {                                          # Matches all requests ending in .php
                                               # https://yopeng.42.fr/blog/post.php?id=42
        
        fastcgi_split_path_info ^(.+\.php)(/.+)$;       # Split URL into script and PATH_INFO (used for URLs like /index.php/blog/42)
        fastcgi_pass wordpress:9000;                    # Forward the request to the 'wordpress' container on port 9000 (FastCGI)
        fastcgi_index index.php;                        # Set the default file to use as the index for PHP requests
        include fastcgi_params;                         # Include standard FastCGI configuration parameters
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; # Pass the absolute path of the script to the PHP-FPM processor
                                                        # Absolute path of executed PHP file
                                                        # Example: /var/www/html/blog/post.php
        fastcgi_param PATH_INFO $fastcgi_path_info;     # Extra path information (only for URL rewriting cases)
                                                        # Example: /index.php/blog/42 → PATH_INFO = /blog/42                          
    }

                                               # https://yopeng.42.fr/static
    location /static/                          # match all request starts with /static/
    {                        
        proxy_pass http://static_site:80/;     # pass request to "static_site" container port 80 (/ at the end is inportant)
        proxy_set_header Host $host;           # passes the original Host header to the backend
        proxy_set_header X-Real-IP $remote_addr;  # sends the real client IP address to the backend
                                               # https://yopeng.42.fr/static
                                               # request: get /static HTTP/1.1; Host:yopeng.42.fr
                                               # "/static/" -> request to static_site -> http://static_site:80
                                               # -> read /usr/share/nginx/html/index.html(my static site) -> return static site to browser
    }
}

